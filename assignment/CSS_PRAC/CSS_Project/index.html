<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet"  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
</head>

<body>

<header>
<div class="navbar">

<div class="logo">
<i class="fa-brands fa-amazon"></i>
</div>

<div class="nav-address">
<p class="add1">Deliver to</p>
<div class="add-icon">
<i class="fa-solid fa-location-dot"></i>
<p class="add2">India</p>
</div>
</div>

<div class="nav-search">
<select class="search-select"><option>All</option></select>
<input class="search-input" placeholder="Search Amazon">
<div class="search-icon">
<i class="fa-solid fa-magnifying-glass"></i>
</div>
</div>

<div class="nav-signin">
<p>Hello, sign in</p>
<p>Account & Lists</p>
</div>

<div class="nav-cart">
<i class="fa-solid fa-cart-shopping"></i>
</div>

</div>

<div class="panel">
<p>☰ All</p>
<p>Today's Deals</p>
<p>Customer Service</p>
<p>Registry</p>
<p>Gift Cards</p>
</div>
</header>

<div class="hero"></div>

<div class="shop">
<div class="box">
<h3>Clothes</h3>
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT4eI6crO6-BasGezQVn8POkdYFRCUz_9R_PA&s">
</div>

<div class="box">
<h3>Electronics</h3>
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
</div>

<div class="box">
<h3>Furniture</h3>
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
</div>

<div class="box">
<h3>Beauty</h3>
<img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
</div>
</div>

<div class="footer">
<p>Amazon Clone Project | Made by You</p>
</div>

</body>
</html>
