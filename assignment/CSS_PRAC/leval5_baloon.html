<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bottom to Top Balls</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 100vh;
      background: #5ec9f1;
    }

    .ball {
      width: 70px;
      height: 100px;
      border-radius: 50%;
      margin: 10px;
      position: relative;
      animation: moveUp 10s infinite;
    }
      /* Rope below each balloon */
    .ball::after {
      content: "";
      position: absolute;
      bottom: -40px;   /* rope below balloon */
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 40px;
      background: #333; /* rope color */
    }

    .ball:nth-child(1) { background: red; animation-delay: 0s; }
    .ball:nth-child(2) { background: blue; animation-delay: 0.5s; }
    .ball:nth-child(3) { background: green; animation-delay: 1s; }
    .ball:nth-child(4) { background: orange; animation-delay: 1.5s; }
    .ball:nth-child(5) { background: purple; animation-delay: 2s; }

    @keyframes moveUp {
      0%   { bottom: 0; opacity: 9; }
      50%  { bottom: 680px; opacity: 0.9; }
      100% { bottom: 90; opacity: 0; }
    }
  
  </style>
</head>
<body>
  <div class="ball"></div>
  <div class="ball"></div>
  <div class="ball"></div>
  <div class="ball"></div>
  <div class="ball"></div>
</body>
</html>
